<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>JWE Herd Ledger</title>
<style>
:root{--paper:#F3EFE6;--card:#FBF9F4;--ink:#2A2C28;--soft:#6F6B5E;--line:#DED7C7;
--ochre:#A8762A;--sage:#5E7551;--clay:#A8482E;--amber:#C0871A;--qcol:#7a5cab;}
*{box-sizing:border-box;}
body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4{font-family:Georgia,"Times New Roman",serif;font-weight:600;margin:0;letter-spacing:-.01em;}
.hd{display:flex;align-items:center;gap:14px;padding:18px 16px 10px;}
.hd .mk{font-size:28px;color:var(--ochre);}
.hd h1{font-size:23px;}
.hd p{margin:2px 0 0;color:var(--soft);font-size:13px;}
.tabs{display:flex;gap:6px;padding:0 12px 10px;position:sticky;top:0;background:var(--paper);z-index:5;border-bottom:1px solid var(--line);}
.tabs button{flex:1;padding:11px 6px;border:none;background:transparent;color:var(--soft);font-size:15px;font-weight:600;border-bottom:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.tabs button.on{color:var(--ink);border-bottom-color:var(--ochre);}
.pill{background:var(--line);color:var(--ink);border-radius:999px;font-size:11px;padding:1px 7px;font-weight:700;}
.pill.warn{background:var(--clay);color:#fff;}
.wrap{padding:16px 14px 70px;max-width:780px;margin:0 auto;}
.empty{padding:40px 18px;text-align:center;color:var(--soft);}
.lead{color:var(--soft);font-size:14px;margin:0 0 14px;}
.muted{color:var(--soft);}.sm{font-size:13px;}

.periodbar{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:14px;}
.periodbar .row1{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;}
.periodbar label{display:flex;flex-direction:column;font-size:11px;font-weight:600;color:var(--soft);text-transform:uppercase;letter-spacing:.04em;gap:4px;}
.periodbar input,.periodbar select{font-size:16px;padding:8px 9px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);}
.presets{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.presets button{background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 11px;font-size:13px;font-weight:600;cursor:pointer;color:var(--ink);}
.presets button:active{background:#efe9dc;}

.ledger{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--sage);border-radius:12px;padding:16px 14px;margin-bottom:14px;}
.ledger.bad{border-left-color:var(--clay);}
.ledger-eq{display:flex;align-items:flex-end;justify-content:space-between;gap:4px;flex-wrap:wrap;}
.cell{display:flex;flex-direction:column;align-items:center;text-align:center;flex:1;min-width:60px;}
.cell b{font-family:Georgia,serif;font-size:26px;line-height:1;}
.cell span{font-size:11px;color:var(--soft);margin-top:5px;line-height:1.2;}
.cell.strong b{color:var(--sage);}
.op{font-size:19px;color:var(--soft);padding:0 2px 9px;}
.flag{margin-top:13px;padding-top:11px;border-top:1px dashed var(--line);text-align:center;font-size:14px;font-weight:600;}
.flag.ok{color:var(--sage);}.flag.bad{color:var(--clay);}

.note{border-radius:10px;padding:10px 12px;font-size:13px;margin-bottom:14px;background:#fbf3e3;border:1px solid #ecd9a8;color:#7a5a13;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:520px){.grid2{grid-template-columns:1fr;}}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;}
.card .ch{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;}
.card .ch h3{font-size:15px;}
.tot{font-family:Georgia,serif;font-size:22px;color:var(--ochre);}
table{width:100%;border-collapse:collapse;}
.tbl td{padding:6px 0;border-bottom:1px solid var(--line);font-size:14px;}
.tbl td.num{text-align:right;font-weight:700;width:48px;}
.tbl tr:last-child td{border-bottom:none;}
.cft{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);font-size:13px;color:var(--soft);}

.mini{display:flex;gap:8px;text-align:center;}
.mini>div{flex:1;display:flex;flex-direction:column;gap:3px;}
.mini b{font-family:Georgia,serif;font-size:23px;}
.mini b.q{color:var(--qcol);}
.mini span{font-size:11px;color:var(--soft);}
.cap{width:54px;margin-top:4px;font-size:14px;padding:3px 5px;border:1px solid var(--line);border-radius:6px;text-align:center;}

.btn{border:none;border-radius:9px;padding:11px 15px;font-size:15px;font-weight:600;cursor:pointer;}
.primary{background:var(--ink);color:#fff;}
.primary:disabled{opacity:.4;}
.primary.wide{width:100%;padding:14px;font-size:16px;}
.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);}
.danger{background:transparent;border:1px solid var(--clay);color:var(--clay);}

.toolbar{display:flex;gap:8px;margin-bottom:12px;}
.search{flex:1;font-size:16px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:var(--card);}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;-webkit-overflow-scrolling:touch;}
.chip{white-space:nowrap;background:var(--card);border:1px solid var(--line);color:var(--soft);border-radius:999px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink);}

.list{list-style:none;margin:0;padding:0;}
.rowi{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 13px;margin-bottom:8px;cursor:pointer;}
.rowi:active{background:#f2eee3;}
.rmain{display:flex;flex-direction:column;gap:2px;min-width:0;}
.rname{font-weight:700;font-size:15px;}
.qbadge{display:inline-block;margin-left:7px;font-size:10px;font-weight:800;color:#fff;background:var(--qcol);border-radius:5px;padding:1px 5px;vertical-align:middle;}
.rmeta{font-size:12px;color:var(--soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;}
.tag.live{background:#e6efe1;color:var(--sage);}
.tag.adopted{background:#eae4f2;color:#6a4fa0;}
.tag.lost{background:#f4e0da;color:var(--clay);}
.tag.direct{background:#eee9da;color:var(--ochre);}
.tag.quar{background:#ece4f5;color:var(--qcol);}
.due{font-size:12px;font-weight:700;padding:4px 10px;border-radius:999px;white-space:nowrap;}
.due.overdue{background:var(--clay);color:#fff;}
.due.soon{background:#fbeccb;color:#86610f;}
.due.ok{background:#e6efe1;color:var(--sage);}
.due.muted{background:var(--line);color:var(--soft);}

.modal{position:fixed;inset:0;background:rgba(30,28,22,.5);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
@media(min-width:600px){.modal{align-items:center;}}
.sheet{background:var(--paper);width:100%;max-width:580px;max-height:94vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column;overflow:hidden;}
@media(min-width:600px){.sheet{border-radius:16px;}}
.sh{display:flex;align-items:center;justify-content:space-between;padding:15px 16px 10px;border-bottom:1px solid var(--line);}
.sh h2{font-size:19px;}
.x{background:none;border:none;font-size:20px;color:var(--soft);cursor:pointer;}
.body{padding:14px 16px;overflow-y:auto;}
.ft{display:flex;align-items:center;gap:8px;padding:12px 16px;border-top:1px solid var(--line);background:var(--card);}
.spacer{flex:1;}
.f{display:flex;flex-direction:column;gap:5px;font-size:12px;font-weight:600;color:var(--soft);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px;}
.f input,.f select,.f textarea{font-size:16px;font-weight:400;text-transform:none;letter-spacing:0;padding:10px 11px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);width:100%;font-family:inherit;}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.check{display:flex;align-items:center;gap:9px;font-size:14px;margin-bottom:14px;cursor:pointer;}
.check input{width:18px;height:18px;}
.box{background:#f7f3ea;border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:14px;}
.box h4{font-size:14px;margin:0 0 8px;}
.qnow{margin-left:8px;font-size:11px;font-weight:700;color:#fff;background:var(--qcol);border-radius:5px;padding:1px 6px;}
.logform{display:flex;flex-direction:column;gap:8px;margin:8px 0 12px;}
.logform input,.logform select{font-size:16px;padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;width:100%;font-family:inherit;}
.timeline{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}
.timeline li{background:#fff;border:1px solid var(--line);border-radius:8px;padding:9px 11px;position:relative;}
.tlt{display:flex;justify-content:space-between;gap:8px;}
.tlt b{font-size:13px;}.tlt span{font-size:12px;color:var(--soft);}
.tln{margin:5px 0 0;font-size:13px;}
.thumb{margin-top:7px;max-width:100%;max-height:170px;border-radius:6px;display:block;}
.tll{font-size:12px;color:var(--ochre);font-weight:600;text-decoration:none;display:inline-block;margin-top:5px;}
.tlx{position:absolute;right:9px;bottom:8px;background:none;border:none;color:var(--soft);font-size:11px;cursor:pointer;text-decoration:underline;}
.databar{display:flex;gap:8px;justify-content:center;padding:8px 14px 24px;flex-wrap:wrap;}
.databar button{background:transparent;border:1px solid var(--line);color:var(--soft);border-radius:8px;padding:8px 12px;font-size:13px;font-weight:600;cursor:pointer;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;font-size:14px;z-index:80;opacity:0;transition:opacity .2s;pointer-events:none;}
.toast.show{opacity:1;}
</style>
</head>

  const inEnd=base.filter(h=>h.intakeDate&&h.intakeDate<=e&&(!h.outcomeDate||h.outcomeDate>e));
  const inPeriod=base.filter(h=>h.intakeDate&&h.intakeDate<=e&&(!h.outcomeDate||h.outcomeDate>=s));
  const tally=(arr,key)=>{const m={};arr.forEach(h=>{const k=(h[key]||"Unspecified");m[k]=(m[k]||0)+1;});return Object.entries(m).sort((a,b)=>b[1]-a[1]);};
  const computedEnd=inStart.length+intk.length-outc.length;
  return {
    inStart:inStart.length, intk:intk.length, outc:outc.length, inEnd:inEnd.length,
    computedEnd, balances:computedEnd===inEnd.length,
    intkRows:tally(intk,"intakeSource"),
    outcRows:tally(outc, h=>h).length?tally(outc,"outcomeType"):tally(outc,"status"),
    breedRows:tally(inPeriod,"breed"), breedTotal:inPeriod.length,
    registered:inPeriod.filter(h=>h.registered).length,
    fosterNow:state.horses.filter(h=>h.status==="In Custody – Foster").length,
    quarantineNow:state.horses.filter(h=>isActive(h)&&isQuar(h)).length,
    missingIntake:state.horses.filter(h=>!h.intakeDate).length,
    missingOutcome:state.horses.filter(h=>isOutcome(h)&&!h.outcomeDate).length,
  };
}
function dueState(d){
  if(!d) return {label:"No date set",tone:"muted",rank:2};
  const t=new Date();t.setHours(0,0,0,0);const dd=new Date(d+"T00:00:00");
  const diff=Math.round((dd-t)/86400000);
  if(diff<0) return {label:"Overdue "+Math.abs(diff)+"d",tone:"overdue",rank:0};
  if(diff<=14) return {label:"Due in "+diff+"d",tone:"soon",rank:1};
  return {label:"Due "+d,tone:"ok",rank:3};
}

/* ---------- rendering ---------- */
function setPeriod(half){
  if(half==="H1"){pStart=pYear+"-01-01";pEnd=pYear+"-06-30";}
  else if(half==="H2"){pStart=pYear+"-07-01";pEnd=pYear+"-12-31";}
  else {pStart=pYear+"-01-01";pEnd=pYear+"-12-31";}
  render();
}
function render(){
  document.getElementById("tabs").innerHTML=tabsHTML();
  const a=document.getElementById("app");
  if(view==="report") a.innerHTML=reportHTML();
  else if(view==="herd") a.innerHTML=herdHTML();
  else a.innerHTML=followHTML();
}
function tabsHTML(){
  const od=state?state.horses.filter(h=>["In Custody – Foster","Adopted"].includes(h.status)&&dueState(h.nextFollowUp).tone==="overdue").length:0;
  return `<button class="${view==='report'?'on':''}" onclick="view='report';render()">Report</button>
  <button class="${view==='herd'?'on':''}" onclick="view='herd';render()">Herd <span class="pill">${state.horses.length}</span></button>
  <button class="${view==='followups'?'on':''}" onclick="view='followups';render()">Follow-ups ${od?`<span class="pill warn">${od}</span>`:""}</button>`;
}
function reportHTML(){
  const r=report();
  const cell=(n,l,strong)=>`<div class="cell ${strong?'strong':''}"><b>${n}</b><span>${l}</span></div>`;
  const panel=(title,total,rows,empty,footer)=>`<section class="card"><div class="ch"><h3>${title}</h3><span class="tot">${total}</span></div>`+
    (rows.length?`<table class="tbl"><tbody>${rows.map(([k,v])=>`<tr><td>${esc(k)}</td><td class="num">${v}</td></tr>`).join("")}</tbody></table>`:`<p class="muted sm">${empty}</p>`)+
    (footer?`<div class="cft">${footer}</div>`:"")+`</section>`;
  return `<main class="wrap">
   <div class="periodbar">
     <div class="row1">
       <label>From<input type="date" value="${pStart}" onchange="pStart=this.value;render()"></label>
       <label>To<input type="date" value="${pEnd}" onchange="pEnd=this.value;render()"></label>
       <label>Year<select onchange="pYear=+this.value">${[2023,2024,2025,2026].map(y=>`<option ${y===pYear?'selected':''}>${y}</option>`).join("")}</select></label>
     </div>
     <div class="presets">
       <button onclick="setPeriod('H1')">Jan&ndash;Jun</button>
       <button onclick="setPeriod('H2')">Jul&ndash;Dec</button>
       <button onclick="setPeriod('FULL')">Full year</button>
     </div>
   </div>
   <section class="ledger ${r.balances?'ok':'bad'}">
     <div class="ledger-eq">
       ${cell(r.inStart,"In custody, period start")}<span class="op">+</span>
       ${cell(r.intk,"Intakes")}<span class="op">&minus;</span>
       ${cell(r.outc,"Outcomes")}<span class="op">=</span>
       ${cell(r.inEnd,"In custody, period end",true)}
     </div>
     <div class="flag ${r.balances?'ok':'bad'}">${r.balances?"&#10003; The books balance":"Off by "+Math.abs(r.computedEnd-r.inEnd)+" &mdash; check records missing a date"}</div>
   </section>
   ${(r.missingIntake||r.missingOutcome)?`<div class="note">${r.missingIntake?r.missingIntake+" horse(s) have no intake date. ":""}${r.missingOutcome?r.missingOutcome+" exited horse(s) have no outcome date. ":""}Add dates and totals tie out.</div>`:""}
   <div class="grid2">
     ${panel("Intakes",r.intk,r.intkRows,"No intakes in this period.")}
     ${panel("Outcomes",r.outc,r.outcRows,"No outcomes in this period.")}
   </div>
   ${panel("Breeds in custody this period",r.breedTotal,r.breedRows,"None in custody this period.","Registered (papers/microchip/tattoo): "+r.registered)}
   <section class="card mini">
     <div><b>${r.fosterNow}</b><span>in foster now</span></div>
     <div><b class="${r.quarantineNow?'q':''}">${r.quarantineNow}</b><span>in quarantine now</span></div>
     <div><b>${state.settings.fosterCapacity}</b><span>foster capacity<input class="cap" type="number" min="0" value="${state.settings.fosterCapacity}" onchange="state.settings.fosterCapacity=+this.value;save()"></span></div>
   </section>
   <button class="btn primary wide" onclick="copyReport()">Copy these figures for the report</button>
  </main>`;
}
function statusTone(s){return s==="In Custody – Quarantine"?"quar":s&&s.indexOf("In Custody")===0?"live":s==="Adopted"?"adopted":s==="Direct Placement (no custody)"?"direct":"lost";}
function statusShort(s){return (s||"").replace("In Custody – ","").replace("Euthanized – ","Euth ");}
function herdHTML(){
  const chips=["All","In Custody","In Quarantine","Adopted","Euthanized – Medical","Euthanized – Behavior","Died – Natural","Transferred Out"];
  const q=search.trim().toLowerCase();
  const rows=state.horses.filter(h=>filter==="All"?true:filter==="In Custody"?isActive(h):filter==="In Quarantine"?(isActive(h)&&isQuar(h)):h.status===filter)
    .filter(h=>!q||[h.name,h.breed,h.adopter,h.fosterHome,h.savedBy,h.pulledFrom,h.notes].join(" ").toLowerCase().includes(q))
    .sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  return `<main class="wrap">
   <div class="toolbar"><input class="search" placeholder="Search name, breed, adopter…" value="${esc(search)}" oninput="search=this.value;repaintHerd()"><button class="btn primary" onclick="openForm(null)">+ Add</button></div>
   <div class="chips" id="chips">${chips.map(s=>`<button class="chip ${filter===s?'on':''}" onclick="filter='${s}';render()">${statusShort(s)}</button>`).join("")}</div>
   <ul class="list" id="herdlist">${rows.length?rows.map(rowHTML).join(""):'<div class="empty">No horses match.</div>'}</ul>
  </main>`;
}
function repaintHerd(){ // avoid losing search focus
  const q=search.trim().toLowerCase();
  const rows=state.horses.filter(h=>filter==="All"?true:filter==="In Custody"?isActive(h):filter==="In Quarantine"?(isActive(h)&&isQuar(h)):h.status===filter)
    .filter(h=>!q||[h.name,h.breed,h.adopter,h.fosterHome,h.savedBy,h.pulledFrom,h.notes].join(" ").toLowerCase().includes(q))
    .sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  const el=document.getElementById("herdlist"); if(el) el.innerHTML=rows.length?rows.map(rowHTML).join(""):'<div class="empty">No horses match.</div>';
}
function rowHTML(h){
  return `<li class="rowi" onclick="openForm('${h.id}')"><div class="rmain">
   <span class="rname">${esc(h.name)||"(unnamed)"}${isQuar(h)?'<span class="qbadge">QT</span>':""}</span>
   <span class="rmeta">${[esc(h.breed),esc(h.intakeDate||"")].filter(Boolean).join(" · ")}</span>
   </div><span class="tag ${statusTone(h.status)}">${esc(statusShort(h.status))}</span></li>`;
}
function followHTML(){
  const fu=state.horses.filter(h=>["In Custody – Foster","Adopted"].includes(h.status))
    .map(h=>{const last=(h.log||[]).map(l=>l.date).sort().slice(-1)[0]||null;return {h,last,due:dueState(h.nextFollowUp)};})
    .sort((a,b)=>a.due.rank-b.due.rank||((a.h.nextFollowUp||"").localeCompare(b.h.nextFollowUp||"")));
  return `<main class="wrap"><p class="lead">Foster and adopted horses you owe ongoing checks. Overdue rises to the top.</p>
   <ul class="list">${fu.length?fu.map(({h,last,due})=>`<li class="rowi" onclick="openForm('${h.id}')"><div class="rmain">
     <span class="rname">${esc(h.name)}</span>
     <span class="rmeta">${h.status==="Adopted"?"Adopter: "+(esc(h.adopter)||"—"):"Foster: "+(esc(h.fosterHome)||"—")}${last?" · last update "+last:" · no updates"}</span>
     </div><span class="due ${due.tone}">${due.label}</span></li>`).join(""):'<div class="empty">No foster or adopted horses yet.</div>'}</ul></main>`;
}

/* ---------- add / edit form ---------- */
function openForm(id){
  draft = id? JSON.parse(JSON.stringify(state.horses.find(h=>h.id===id))) : {id:uid(),name:"",breed:"",registered:false,registrationDetail:"",intakeDate:"",intakePrecision:"month",intakeSource:INTAKE_SOURCES[0],savedBy:"",pulledFrom:"",status:STATUSES[0],fosterHome:"",quarantineIn:"",quarantineOut:"",outcomeDate:"",outcomeType:"",outcomeDetail:"",adopter:"",followUpEvery:"",nextFollowUp:"",log:[],notes:""};
  if(!draft.log) draft.log=[];
  renderForm();
}
function closeForm(){draft=null;const m=document.getElementById("modal");if(m)m.remove();}
function fset(k,v){draft[k]=v;}
function renderForm(){
  const ex=document.getElementById("modal"); if(ex) ex.remove();
  const d=draft, isNew=!state.horses.some(h=>h.id===d.id);
  const showFoster=d.status==="In Custody – Foster", showAdopt=d.status==="Adopted", showOut=isOutcome(d), showLog=showFoster||showAdopt;
  const opt=(arr,sel)=>arr.map(o=>`<option ${o===sel?'selected':''}>${esc(o)}</option>`).join("");
  const m=document.createElement("div"); m.className="modal"; m.id="modal"; m.onclick=e=>{if(e.target===m)closeForm();};
  m.innerHTML=`<div class="sheet">
   <div class="sh"><h2>${isNew?"Add horse":esc(d.name)||"Edit horse"}</h2><button class="x" onclick="closeForm()">&#10005;</button></div>
   <div class="body">
     <label class="f">Name<input value="${esc(d.name)}" oninput="fset('name',this.value)"></label>
     <div class="f2">
       <label class="f">Breed<input list="breeds" value="${esc(d.breed)}" oninput="fset('breed',this.value)"></label>
       <label class="f">Status<select onchange="fset('status',this.value);renderForm()">${opt(STATUSES,d.status)}</select></label>
     </div>
     <label class="check"><input type="checkbox" ${d.registered?"checked":""} onchange="fset('registered',this.checked)"> Registered (papers / microchip / tattoo)</label>
     <div class="f2">
       <label class="f">Month / date brought in<input value="${esc(d.intakeDate)}" placeholder="2024-12 or 2025-04-05" oninput="fset('intakeDate',this.value)"></label>
       <label class="f">How it came in<select onchange="fset('intakeSource',this.value)">${opt(INTAKE_SOURCES,d.intakeSource)}</select></label>
     </div>
     <div class="f2">
       <label class="f">Saved by (org / person)<input value="${esc(d.savedBy)}" oninput="fset('savedBy',this.value)"></label>
       <label class="f">Pulled from (which kill pen / where)<input value="${esc(d.pulledFrom)}" oninput="fset('pulledFrom',this.value)"></label>
     </div>
     <div class="box"><h4>Quarantine ${isQuar(d)?'<span class="qnow">in quarantine now</span>':""}</h4>
       <div class="f2">
         <label class="f">Date in<input type="date" value="${esc(d.quarantineIn)}" onchange="fset('quarantineIn',this.value);renderForm()"></label>
         <label class="f">Date out<input type="date" value="${esc(d.quarantineOut)}" onchange="fset('quarantineOut',this.value);renderForm()"></label>
       </div><p class="muted sm" style="margin:2px 0 0">Leave date out blank while still in quarantine.</p>
     </div>
     ${showFoster?`<label class="f">Foster home<input value="${esc(d.fosterHome)}" oninput="fset('fosterHome',this.value)"></label>`:""}
     ${showAdopt?`<div class="f2"><label class="f">Adopter<input value="${esc(d.adopter)}" oninput="fset('adopter',this.value)"></label><label class="f">Adoption date<input type="date" value="${esc(d.outcomeDate)}" onchange="fset('outcomeDate',this.value)"></label></div>`:""}
     ${showOut&&!showAdopt?`<div class="f2"><label class="f">Outcome date<input type="date" value="${esc(d.outcomeDate)}" onchange="fset('outcomeDate',this.value)"></label><label class="f">Cause / detail<input value="${esc(d.outcomeDetail)}" oninput="fset('outcomeDetail',this.value)"></label></div>`:""}
     ${showLog?`<div class="box"><div class="f2">
         <label class="f">Follow-up every (months)<input type="number" min="0" value="${esc(d.followUpEvery)}" placeholder="3" oninput="fset('followUpEvery',this.value)"></label>
         <label class="f">Next follow-up due<input type="date" value="${esc(d.nextFollowUp)}" onchange="fset('nextFollowUp',this.value)"></label>
       </div>
       <h4>Update log</h4>
       <div class="logform">
         <div class="f2"><input type="date" id="le-date" value="${todayISO()}"><select id="le-type">${opt(LOG_TYPES,LOG_TYPES[0])}</select></div>
         <input id="le-note" placeholder="Note (what happened)">
         <input id="le-photo" placeholder="Photo path or URL (e.g. photos/macho-1.jpg in your repo)">
         <button class="btn ghost" onclick="addLog()">Log this update</button>
       </div>
       <ul class="timeline">${(d.log||[]).map(logHTML).join("")||'<li class="muted sm">No updates logged yet.</li>'}</ul>
     </div>`:""}
     <label class="f">Notes<textarea rows="2" oninput="fset('notes',this.value)" placeholder="Pen/location, medical, anything else">${esc(d.notes)}</textarea></label>
   </div>
   <div class="ft">${isNew?"":'<button class="btn danger" onclick="delHorse()">Delete</button>'}<div class="spacer"></div><button class="btn ghost" onclick="closeForm()">Cancel</button><button class="btn primary" onclick="saveHorse()">Save</button></div>
   <datalist id="breeds">${BREEDS.map(b=>`<option value="${b}">`).join("")}</datalist>
  </div>`;
  document.body.appendChild(m);
}
function logHTML(l){
  const isImg=l.photo&&/\.(jpg|jpeg|png|gif|webp)$/i.test(l.photo);
  return `<li><div class="tlt"><b>${esc(l.type)}</b><span>${esc(l.date)}</span></div>
   ${l.note?`<p class="tln">${esc(l.note)}</p>`:""}
   ${l.photo&&isImg?`<img class="thumb" src="${esc(l.photo)}" alt="" onerror="this.style.display='none'">`:""}
   ${l.photo?`<a class="tll" href="${esc(l.photo)}" target="_blank" rel="noreferrer">Open photo &#8599;</a>`:""}
   <button class="tlx" onclick="delLog('${l.id}')">remove</button></li>`;
}
function addLog(){
  const date=document.getElementById("le-date").value||todayISO();
  const type=document.getElementById("le-type").value;
  const note=document.getElementById("le-note").value;
  const photo=document.getElementById("le-photo").value.trim();
  const e={id:uid(),date,type,note,photo};
  draft.log.unshift(e);
  if(draft.followUpEvery&&+draft.followUpEvery>0&&["Home check","On-site visit","Foster update","Photo received","Phone/text update"].includes(type)){
    const dd=new Date(date+"T00:00:00"); dd.setMonth(dd.getMonth()+ +draft.followUpEvery);
    draft.nextFollowUp=dd.toISOString().slice(0,10);
  }
  renderForm();
}
function delLog(id){draft.log=draft.log.filter(l=>l.id!==id);renderForm();}
function saveHorse(){
  if(!draft.name.trim()){toast("Add a name first");return;}
  // derive intake precision from the date string
  const v=draft.intakeDate||""; draft.intakePrecision = !v?"unknown":/\d{4}-\d{2}-\d{2}/.test(v)?"day":/\d{4}-\d{2}/.test(v)?"month":"year";
  const i=state.horses.findIndex(h=>h.id===draft.id);
  if(i>=0) state.horses[i]=draft; else state.horses.unshift(draft);
  save(); closeForm(); render(); toast("Saved");
}
function delHorse(){ if(confirm("Delete "+(draft.name||"this horse")+"?")){state.horses=state.horses.filter(h=>h.id!==draft.id);save();closeForm();render();toast("Deleted");} }

/* ---------- report copy + data io ---------- */
function copyReport(){
  const r=report();
  const L=[`JWE welfare figures — ${pStart} to ${pEnd}`,"",
   `In custody, period start: ${r.inStart}`,"",
   `Intakes (total ${r.intk}):`,...r.intkRows.map(([k,v])=>`  • ${k}: ${v}`),"",
   `Outcomes (total ${r.outc}):`,...r.outcRows.map(([k,v])=>`  • ${k}: ${v}`),"",
   `In custody, period end: ${r.inEnd}`,
   `In foster now: ${r.fosterNow}   In quarantine now: ${r.quarantineNow}`,"",
   `Breeds in custody this period (total ${r.breedTotal}):`,...r.breedRows.map(([k,v])=>`  • ${k}: ${v}`),
   `Registered: ${r.registered}`];
  const text=L.join("\n");
  if(navigator.clipboard) navigator.clipboard.writeText(text).then(()=>toast("Copied")).catch(()=>prompt("Copy:",text));
  else prompt("Copy:",text);
}
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="tracker-data.json"; a.click(); URL.revokeObjectURL(a.href); toast("Downloaded backup");
}
function importData(ev){
  const f=ev.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{try{const d=JSON.parse(rd.result); if(!d.horses) throw 0; state=d; if(!state.settings)state.settings={fosterCapacity:25}; save(); render(); toast("Imported "+state.horses.length+" records");}catch(e){toast("That file didn't load");}};
  rd.readAsText(f); ev.target.value="";
}

load(); render();
</script>
</body>
</html>
